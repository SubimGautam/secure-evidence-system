server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # Reverse proxy to the backend so the browser only ever talks to one
    # origin — keeps the API off the public network in Docker Compose and
    # sidesteps CORS entirely for same-origin requests in production.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths resolve client-side via React Router.
    location / {
        try_files $uri /index.html;
    }
}
