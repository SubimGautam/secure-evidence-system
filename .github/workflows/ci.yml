name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# A second push to the same branch cancels whatever CI run is still in
# flight for it — no point finishing a lint pass against code that's
# already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend / lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm run format:check
        working-directory: backend

  backend-audit:
    name: Backend / npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      # high, not the npm-audit default (moderate+): the one existing
      # moderate finding lives inside Prisma's own optional dev-server
      # tooling (@prisma/dev), unused and pruned from the production image —
      # see FINAL_PROJECT_SUMMARY.md §"A06 Vulnerable Components". Anything
      # high/critical still fails the build.
      - run: npm audit --audit-level=high
        working-directory: backend

  backend-prisma-validate:
    name: Backend / prisma schema validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      # A syntactically valid connection string is all `prisma validate`
      # needs — it never actually connects, so no live database or secret is
      # required here.
      - run: npx prisma validate
        working-directory: backend
        env:
          DATABASE_URL: 'postgresql://user:pass@localhost:5432/db'

  frontend-lint:
    name: Frontend / lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend

  frontend-audit:
    name: Frontend / npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend

  frontend-build:
    name: Frontend / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker / build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No push here on purpose — this only proves both multi-stage images
      # still build cleanly (catches a broken Dockerfile or a dependency
      # that only fails inside the alpine build stage). Registry publishing
      # is a separate concern for whenever there's somewhere to deploy to.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false

  # TODO: add a `backend-test` job once an automated test suite exists
  # (currently `npm test` is a stub — see FINAL_PROJECT_SUMMARY.md
  # "Remaining limitations"). Unit tests for the audit hash chain and the
  # RBAC/ABAC middleware are the highest-value ones to add first.
